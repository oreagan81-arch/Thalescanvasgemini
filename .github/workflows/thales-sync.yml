name: Thales Protocol Sync

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: 🛡️ Run Thales Protocol Audit
        run: npx tsx scripts/thales-audit.ts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 🚀 Deploy to Canvas LMS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Initiating deterministic deployment to Thales Academy Instance..."
          # In a real setup, this would call a deployment script:
          # npx tsx scripts/deploy-to-canvas.ts
        env:
          CANVAS_API_TOKEN: ${{ secrets.CANVAS_API_TOKEN }}
          CANVAS_DOMAIN: ${{ secrets.CANVAS_DOMAIN }}
